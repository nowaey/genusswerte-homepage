<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A05C1A"/>
      <stop offset="100%" stop-color="#4A2000"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Wooden barrel rings hint -->
  <g fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2">
    <ellipse cx="200" cy="150" rx="160" ry="100"/>
    <ellipse cx="200" cy="150" rx="130" ry="80"/>
    <ellipse cx="200" cy="150" rx="100" ry="62"/>
  </g>
  <!-- Whisky tumbler glass -->
  <g transform="translate(168,65)">
    <rect x="0" y="0" width="64" height="65" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Whisky liquid -->
    <rect x="1" y="30" width="62" height="34" rx="4" fill="rgba(180,90,20,0.55)"/>
    <!-- Ice cube -->
    <rect x="18" y="12" width="22" height="22" rx="3" fill="rgba(200,230,255,0.35)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <!-- Shine -->
    <rect x="4" y="4" width="8" height="20" rx="4" fill="rgba(255,255,255,0.18)"/>
  </g>
  <!-- Almonds / chocolate shapes -->
  <g fill="rgba(255,255,255,0.4)" transform="translate(100,185)">
    <ellipse cx="0" cy="0" rx="14" ry="8" transform="rotate(-20)"/>
    <ellipse cx="30" cy="5" rx="13" ry="7" transform="rotate(10,30,5)"/>
    <ellipse cx="190" cy="-5" rx="14" ry="8" transform="rotate(15,190,-5)"/>
    <ellipse cx="155" cy="8" rx="13" ry="7" transform="rotate(-10,155,8)"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.35)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">TASTING-GUTSCHEIN</text>
  <text x="200" y="290" text-anchor="middle" font-size="15" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Whisky Tasting</text>
</svg>
