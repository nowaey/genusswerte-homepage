<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C86020"/>
      <stop offset="100%" stop-color="#5C1A00"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Orange slice halves in background -->
  <g fill="rgba(255,200,80,0.12)" stroke="rgba(255,200,80,0.2)" stroke-width="1">
    <circle cx="320" cy="60" r="60"/>
    <circle cx="80" cy="220" r="50"/>
  </g>
  <!-- Aperitivo glass (coupe) -->
  <g transform="translate(155,45)">
    <path d="M0 0 L90 0 L58 55 L55 70 L46 70 L44 55 Z" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Campari red liquid -->
    <path d="M12 15 L78 15 L56 55 L45 55 Z" fill="rgba(190,30,20,0.55)"/>
    <!-- Orange slice garnish -->
    <circle cx="12" cy="8" r="12" fill="rgba(255,170,30,0.7)"/>
    <line x1="12" y1="-4" x2="12" y2="20" stroke="rgba(200,130,20,0.6)" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="24" y2="8" stroke="rgba(200,130,20,0.6)" stroke-width="1.5"/>
    <!-- Stem -->
    <rect x="43" y="70" width="4" height="30" fill="rgba(255,255,255,0.5)"/>
    <rect x="34" y="100" width="22" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
  </g>
  <!-- Cracker / breadstick shapes -->
  <g fill="rgba(220,190,130,0.5)">
    <rect x="80" y="160" width="60" height="8" rx="4"/>
    <rect x="90" y="175" width="50" height="8" rx="4"/>
    <rect x="75" y="190" width="70" height="8" rx="4"/>
  </g>
  <!-- Olive bowl hint -->
  <ellipse cx="300" cy="190" rx="45" ry="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <g fill="rgba(50,80,30,0.8)">
    <ellipse cx="275" cy="183" rx="10" ry="7"/>
    <ellipse cx="300" cy="180" rx="10" ry="7"/>
    <ellipse cx="322" cy="184" rx="10" ry="7"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.4)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">GENUSSBOX</text>
  <text x="200" y="290" text-anchor="middle" font-size="15" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Aperitivo Box</text>
</svg>
