<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D2418"/>
      <stop offset="100%" stop-color="#0D0806"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <circle cx="200" cy="130" r="90" fill="rgba(255,255,255,0.03)"/>
  <!-- Truffle shape (bumpy sphere) -->
  <g transform="translate(200,120)">
    <circle cx="0" cy="0" r="52" fill="rgba(50,30,15,0.9)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <circle cx="-18" cy="-22" r="9" fill="rgba(30,15,5,0.8)"/>
    <circle cx="15" cy="-28" r="7" fill="rgba(30,15,5,0.8)"/>
    <circle cx="30" cy="-8" r="10" fill="rgba(30,15,5,0.8)"/>
    <circle cx="22" cy="18" r="8" fill="rgba(30,15,5,0.8)"/>
    <circle cx="-5" cy="30" r="9" fill="rgba(30,15,5,0.8)"/>
    <circle cx="-28" cy="12" r="7" fill="rgba(30,15,5,0.8)"/>
    <circle cx="-32" cy="-12" r="8" fill="rgba(30,15,5,0.8)"/>
    <!-- Shine -->
    <ellipse cx="-14" cy="-20" rx="12" ry="7" fill="rgba(255,255,255,0.08)" transform="rotate(-30,-14,-20)"/>
  </g>
  <!-- Gold dust sparkles -->
  <g fill="rgba(201,169,110,0.6)">
    <circle cx="130" cy="80" r="2"/><circle cx="270" cy="75" r="2.5"/><circle cx="310" cy="160" r="2"/>
    <circle cx="90" cy="180" r="2.5"/><circle cx="155" cy="50" r="1.5"/><circle cx="245" cy="45" r="2"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.5)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">TASTING-GUTSCHEIN</text>
  <text x="200" y="290" text-anchor="middle" font-size="13" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Trüffel &amp; Champagner</text>
</svg>
