<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C88030"/>
      <stop offset="100%" stop-color="#5C2A00"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Sofa cushion hint -->
  <g fill="rgba(255,255,255,0.06)">
    <rect x="50" y="170" width="300" height="70" rx="15"/>
    <rect x="60" y="160" width="140" height="50" rx="10"/>
    <rect x="200" y="160" width="140" height="50" rx="10"/>
  </g>
  <!-- Beer bottle -->
  <g transform="translate(115,55)">
    <rect x="9" y="0" width="12" height="16" rx="3" fill="rgba(255,255,255,0.5)"/>
    <path d="M4 16 L8 36 L8 130 Q8 138 15 138 Q22 138 22 130 L22 36 L26 16 Z" fill="rgba(150,90,30,0.75)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <rect x="8" y="55" width="14" height="28" rx="2" fill="rgba(255,255,255,0.25)"/>
  </g>
  <!-- Wine bottle -->
  <g transform="translate(185,45)">
    <rect x="10" y="0" width="10" height="20" rx="3" fill="rgba(255,255,255,0.45)"/>
    <path d="M3 20 L6 42 L6 140 Q6 148 15 148 Q24 148 24 140 L24 42 L27 20 Z" fill="rgba(40,70,30,0.8)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="6" y="60" width="18" height="35" rx="2" fill="rgba(255,255,255,0.2)"/>
  </g>
  <!-- Snack bag -->
  <g transform="translate(260,120)">
    <path d="M5 0 L75 0 Q80 0 80 5 L80 80 Q80 90 75 90 L5 90 Q0 90 0 80 L0 5 Q0 0 5 0Z" fill="rgba(255,200,50,0.55)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Bag crinkle -->
    <line x1="0" y1="30" x2="80" y2="30" stroke="rgba(200,150,20,0.4)" stroke-width="1.5"/>
    <!-- Text on bag -->
    <rect x="10" y="40" width="60" height="30" rx="3" fill="rgba(255,255,255,0.2)"/>
  </g>
  <!-- Nut shapes -->
  <g fill="rgba(180,120,50,0.6)">
    <ellipse cx="90" cy="200" rx="12" ry="9" transform="rotate(-15,90,200)"/>
    <ellipse cx="115" cy="207" rx="11" ry="8" transform="rotate(10,115,207)"/>
    <ellipse cx="140" cy="198" rx="12" ry="9" transform="rotate(-5,140,198)"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.4)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">GENUSSBOX</text>
  <text x="200" y="290" text-anchor="middle" font-size="15" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Feierabend Box</text>
</svg>
