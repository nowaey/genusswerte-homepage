<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C87830"/>
      <stop offset="100%" stop-color="#5C2800"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Hop circles background -->
  <g fill="rgba(255,255,255,0.07)">
    <circle cx="80" cy="70" r="35"/><circle cx="320" cy="80" r="30"/>
    <circle cx="60" cy="200" r="28"/><circle cx="340" cy="210" r="32"/>
  </g>
  <!-- Beer mug -->
  <g transform="translate(148,50)">
    <!-- Mug body -->
    <path d="M10 0 L90 0 L86 150 L14 150 Z" rx="6" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
    <!-- Beer liquid (amber) -->
    <path d="M11 45 L89 45 L85 150 L15 150 Z" fill="rgba(200,100,20,0.5)"/>
    <!-- Foam top -->
    <ellipse cx="50" cy="44" rx="39" ry="14" fill="rgba(255,255,255,0.65)"/>
    <ellipse cx="35" cy="38" rx="15" ry="10" fill="rgba(255,255,255,0.5)"/>
    <ellipse cx="62" cy="36" rx="12" ry="9" fill="rgba(255,255,255,0.5)"/>
    <!-- Handle -->
    <path d="M90 30 Q125 30 125 75 Q125 120 90 120" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="10" stroke-linecap="round"/>
    <!-- Bubbles -->
    <circle cx="30" cy="100" r="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="55" cy="80" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="70" cy="110" r="4" fill="rgba(255,255,255,0.3)"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.35)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">TASTING-GUTSCHEIN</text>
  <text x="200" y="290" text-anchor="middle" font-size="15" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Craft Beer Tasting</text>
</svg>
