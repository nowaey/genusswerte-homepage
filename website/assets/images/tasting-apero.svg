<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C7A3E"/>
      <stop offset="100%" stop-color="#1E3010"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Wooden board -->
  <rect x="80" y="100" width="240" height="120" rx="10" fill="rgba(140,90,40,0.4)" stroke="rgba(180,120,60,0.3)" stroke-width="1"/>
  <!-- Olives -->
  <g fill="rgba(50,80,30,0.85)" stroke="rgba(255,255,255,0.2)" stroke-width="1">
    <ellipse cx="130" cy="140" rx="14" ry="10"/>
    <ellipse cx="160" cy="150" rx="13" ry="9"/>
    <ellipse cx="110" cy="158" rx="12" ry="9"/>
  </g>
  <!-- Olive pit dots -->
  <circle cx="130" cy="140" r="3" fill="rgba(201,169,110,0.8)"/>
  <circle cx="160" cy="150" r="3" fill="rgba(201,169,110,0.8)"/>
  <circle cx="110" cy="158" r="3" fill="rgba(201,169,110,0.8)"/>
  <!-- Crackers -->
  <g fill="rgba(220,190,130,0.55)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5">
    <rect x="200" y="125" width="35" height="35" rx="3"/>
    <rect x="245" y="130" width="35" height="35" rx="3"/>
    <rect x="215" y="160" width="35" height="35" rx="3"/>
  </g>
  <!-- Aperitif glass -->
  <g fill="rgba(255,255,255,0.6)" transform="translate(165,40)">
    <path d="M0 0 L60 0 L38 50 L35 65 L28 65 L26 50 Z"/>
    <!-- Liquid (Campari red) -->
    <path d="M8 18 L52 18 L36 50 L26 50 Z" fill="rgba(180,40,20,0.5)"/>
    <!-- Stem -->
    <rect x="27" y="65" width="6" height="25" fill="rgba(255,255,255,0.6)"/>
    <rect x="18" y="90" width="24" height="5" rx="2" fill="rgba(255,255,255,0.6)"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.35)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">TASTING-GUTSCHEIN</text>
  <text x="200" y="290" text-anchor="middle" font-size="13" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Apéro &amp; Antipasti</text>
</svg>
