    <path d="M5 10 Q3 30 12 42 L8 58 L5 60 L5 63 L27 63 L27 60 L24 58 L20 42 Q29 30 27 10Z"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.4)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">TASTING-GUTSCHEIN</text>
  <text x="200" y="290" text-anchor="middle" font-size="13" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Wagyu, Wein &amp; Champagner</text>
