<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B1A1A"/>
      <stop offset="100%" stop-color="#2A0808"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Plate -->
  <ellipse cx="200" cy="165" rx="120" ry="55" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <ellipse cx="200" cy="162" rx="100" ry="45" fill="rgba(255,255,255,0.05)"/>
  <!-- Steak shape -->
  <g transform="translate(200,155)">
