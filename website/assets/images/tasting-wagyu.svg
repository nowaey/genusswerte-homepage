    <path d="M-40 -8 Q-10 -18 20 -5 Q40 2 60 -10" fill="none" stroke="rgba(255,220,180,0.25)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-50 5 Q-20 15 10 8 Q35 3 55 12" fill="none" stroke="rgba(255,220,180,0.2)" stroke-width="2" stroke-linecap="round"/>
    <path d="M-30 -2 Q0 10 30 0" fill="none" stroke="rgba(255,220,180,0.2)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Sear marks -->
    <path d="M-45 -12 L-30 18" stroke="rgba(60,20,10,0.6)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-20 -18 L-5 18" stroke="rgba(60,20,10,0.6)" stroke-width="5" stroke-linecap="round"/>
    <path d="M10 -18 L25 18" stroke="rgba(60,20,10,0.6)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Champagne glass hint (small) -->
