  <!-- Logo watermark -->
  <text x="300" y="430" text-anchor="middle" font-size="13" font-family="Georgia,serif" fill="rgba(201,169,110,0.5)" letter-spacing="5">GENUSSWERTE BONN</text>
  <text x="300" y="460" text-anchor="middle" font-size="10" font-family="Georgia,serif" fill="rgba(255,255,255,0.3)" letter-spacing="3">FEINKOST · POPPELSDORF</text>
