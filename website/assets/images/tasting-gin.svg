<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A5C3F"/>
      <stop offset="100%" stop-color="#0D2418"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Botanical leaves -->
  <g fill="rgba(255,255,255,0.12)" stroke="none">
    <ellipse cx="100" cy="80" rx="40" ry="18" transform="rotate(-30,100,80)"/>
    <ellipse cx="300" cy="80" rx="40" ry="18" transform="rotate(30,300,80)"/>
    <ellipse cx="80" cy="180" rx="35" ry="15" transform="rotate(-45,80,180)"/>
    <ellipse cx="320" cy="180" rx="35" ry="15" transform="rotate(45,320,180)"/>
    <ellipse cx="140" cy="50" rx="30" ry="12" transform="rotate(-15,140,50)"/>
    <ellipse cx="260" cy="50" rx="30" ry="12" transform="rotate(15,260,50)"/>
  </g>
  <!-- Gin glass (highball) -->
  <g fill="rgba(255,255,255,0.7)" transform="translate(178,55)">
    <path d="M10 0 L34 0 L30 130 L14 130 Z" rx="4"/>
    <!-- Ice cube hint -->
    <rect x="14" y="25" width="14" height="14" fill="rgba(180,220,255,0.5)" rx="2"/>
    <!-- Lemon slice -->
    <circle cx="21" cy="65" r="10" fill="rgba(255,220,80,0.6)"/>
    <line x1="21" y1="55" x2="21" y2="75" stroke="rgba(200,160,40,0.8)" stroke-width="1.5"/>
    <line x1="11" y1="65" x2="31" y2="65" stroke="rgba(200,160,40,0.8)" stroke-width="1.5"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.35)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">TASTING-GUTSCHEIN</text>
  <text x="200" y="290" text-anchor="middle" font-size="15" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Gin Tasting</text>
</svg>
