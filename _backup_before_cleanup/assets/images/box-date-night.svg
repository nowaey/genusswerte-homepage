<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C2050"/>
      <stop offset="100%" stop-color="#2A0618"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Heart shape -->
  <g fill="rgba(255,255,255,0.08)" transform="translate(200,120)">
    <path d="M0 40 Q-80 -20 -60 -60 Q-40 -90 0 -60 Q40 -90 60 -60 Q80 -20 0 40Z"/>
  </g>
  <!-- Two champagne flutes clinking -->
  <g transform="translate(135,45)">
    <!-- Left glass -->
    <path d="M12 0 Q14 35 8 55 L5 65 L3 67 L3 70 L15 70 L15 67 L13 65 L10 55 Q4 35 6 0Z" fill="rgba(255,255,255,0.65)"/>
    <!-- Right glass -->
    <path d="M48 0 Q50 35 56 55 L59 65 L61 67 L61 70 L73 70 L73 67 L71 65 L68 55 Q62 35 64 0Z" fill="rgba(255,255,255,0.65)"/>
    <!-- Champagne liquid -->
    <path d="M7 12 Q8 30 9 55 L10 55 Q5 30 6 12Z" fill="rgba(220,190,100,0.4)"/>
    <path d="M63 12 Q62 30 61 55 L62 55 Q67 30 68 12Z" fill="rgba(220,190,100,0.4)"/>
    <!-- Bubbles -->
    <g fill="rgba(255,255,255,0.35)">
      <circle cx="10" cy="40" r="2"/><circle cx="9" cy="30" r="1.5"/><circle cx="11" cy="48" r="1.5"/>
      <circle cx="64" cy="38" r="2"/><circle cx="65" cy="28" r="1.5"/><circle cx="63" cy="50" r="1.5"/>
    </g>
  </g>
  <!-- Chocolate pieces -->
  <g fill="rgba(80,35,10,0.7)" stroke="rgba(201,169,110,0.4)" stroke-width="0.5">
    <rect x="90" y="170" width="32" height="28" rx="3"/>
    <rect x="130" y="175" width="30" height="28" rx="3"/>
    <line x1="90" y1="184" x2="122" y2="184" stroke="rgba(201,169,110,0.3)" stroke-width="1"/>
    <line x1="106" y1="170" x2="106" y2="198" stroke="rgba(201,169,110,0.3)" stroke-width="1"/>
  </g>
  <!-- Cheese wedge -->
  <g fill="rgba(220,190,80,0.6)" transform="translate(255,155)">
    <path d="M0 50 L60 0 L90 50 Z"/>
    <circle cx="35" cy="32" r="5" fill="rgba(255,255,255,0.4)"/>
    <circle cx="55" cy="42" r="4" fill="rgba(255,255,255,0.4)"/>
  </g>
  <!-- Rose petals scatter -->
  <g fill="rgba(255,100,120,0.3)">
    <ellipse cx="320" cy="90" rx="12" ry="7" transform="rotate(-30,320,90)"/>
    <ellipse cx="340" cy="110" rx="11" ry="6" transform="rotate(15,340,110)"/>
    <ellipse cx="60" cy="100" rx="11" ry="6" transform="rotate(20,60,100)"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.4)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">GENUSSBOX</text>
  <text x="200" y="290" text-anchor="middle" font-size="15" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Date Night Box</text>
</svg>
