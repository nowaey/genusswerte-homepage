<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D4A3E"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- Gift box body -->
  <g transform="translate(130,80)">
    <!-- Box lid -->
    <rect x="0" y="0" width="140" height="30" rx="5" fill="rgba(201,169,110,0.75)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Box body -->
    <rect x="8" y="30" width="124" height="100" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <!-- Ribbon vertical -->
    <rect x="63" y="0" width="14" height="130" fill="rgba(201,169,110,0.5)"/>
    <!-- Ribbon horizontal -->
    <rect x="0" y="0" width="140" height="14" fill="rgba(201,169,110,0.5)"/>
    <!-- Bow left loop -->
    <ellipse cx="47" cy="-12" rx="24" ry="12" fill="rgba(201,169,110,0.8)" transform="rotate(-25,47,-12)"/>
    <!-- Bow right loop -->
    <ellipse cx="93" cy="-12" rx="24" ry="12" fill="rgba(201,169,110,0.8)" transform="rotate(25,93,-12)"/>
    <!-- Bow center -->
    <circle cx="70" cy="-2" r="10" fill="rgba(201,169,110,0.9)"/>
    <!-- Stars on box -->
    <circle cx="35" cy="75" r="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="105" cy="60" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="75" cy="95" r="3.5" fill="rgba(255,255,255,0.3)"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.35)"/>
  <text x="200" y="271" text-anchor="middle" font-size="11" font-family="Georgia,serif" fill="rgba(201,169,110,0.9)" letter-spacing="3">WERTGUTSCHEIN</text>
  <text x="200" y="290" text-anchor="middle" font-size="13" font-family="Georgia,serif" font-weight="bold" fill="white" letter-spacing="1">Genusswerte Wertgutschein</text>
</svg>
